# Fichier de config Render — Blueprint
# Sur render.com : "New" > "Blueprint" > sélectionne ce dépôt, Render lira ce fichier.
# Il faudra quand même renseigner manuellement les variables marquées "sync: false"
# (secrets) dans le dashboard Render après la création du service.

services:
  - type: web
    name: concourspro-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
